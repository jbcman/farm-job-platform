services:
  - type: web
    name: farm-job-platform
    runtime: node
    nodeVersion: 22.x
    buildCommand: npm install && cd server && npm install && cd .. && node server/init_pg.js && node server/migrate_optimize.js && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
